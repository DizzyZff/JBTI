<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JBTI-32 | 本能原力全解析 V4.5</title>
    <style>
        /* --- 全局视觉系统 --- */
        :root {
            --primary: #ff4757;    /* 动能红 */
            --accent: #ffa502;     /* 警示橙 */
            --bg: #050508;         /* 深空底 */
            --card: #12121f;       /* 赛博黑卡 */
            --text: #e0e0e0;       /* 灰白字 */
            --line: rgba(255, 255, 255, 0.06);
            --shimmer: #1a1a2e;    /* 骨架屏基色 */
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        #app { width: 100%; max-width: 460px; padding: 15px; }

        /* --- 卡片与动效 --- */
        .card { 
            background: var(--card); 
            padding: 30px 24px; 
            border-radius: 36px; 
            border: 1px solid var(--line);
            text-align: center;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.7);
            animation: cardFadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @keyframes cardFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 交互选项 --- */
        .btn-opt { 
            background: #1e1e2e; 
            border: 1px solid #333; 
            color: #bbb; 
            padding: 19px; 
            border-radius: 22px; 
            margin-bottom: 14px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 1rem; 
            line-height: 1.5;
            transition: all 0.2s;
        }
        .btn-opt:active { 
            background: var(--primary); 
            color: #fff; 
            transform: scale(0.96) translateY(2px); 
            border-color: transparent;
        }

        /* --- 进度条 --- */
        .progress-box { width: 100%; height: 6px; background: #222; border-radius: 3px; margin-bottom: 35px; overflow: hidden; }
        .progress-inner { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 0.4s; }

        /* --- 结果图片容器 --- */
        .res-img-container {
            width: 100%;
            height: 230px; 
            margin: 0 auto 25px;
            border-radius: 24px;
            border: 2px solid var(--line);
            background-color: var(--shimmer);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .res-img-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.05) 50%, transparent 100%);
            animation: shimmer 1.5s infinite;
        }
        .res-img-container.loaded::after { display: none; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        /* --- 结果报告样式 --- */
        .summary-box { 
            background: linear-gradient(135deg, rgba(255,71,87,0.1) 0%, transparent 100%); 
            border-left: 5px solid var(--primary); 
            padding: 22px; 
            border-radius: 18px; 
            margin: 20px 0; 
            text-align: left;
            line-height: 1.7;
            color: #fff;
        }
        .detail-section { 
            background: rgba(255,255,255,0.03); 
            padding: 18px; 
            border-radius: 20px; 
            margin-bottom: 12px; 
            text-align: left;
            border: 1px solid var(--line);
        }
        .section-tag { color: var(--accent); font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 6px; }

        #quiz-view, #result-view { display: none; }
    </style>
</head>

    // --- C. 图片路径映射池 ---
    const personaImages = {
        "BHPD": "img/BHPD.jpg", "BHPE": "img/BHPE.png", "BHAD": "img/BHAD.jpg", "BHAE": "img/BHAE.jpg",
        "BFPD": "img/BFPD.jpg", "BFPE": "img/BFPE.jpg", "BFAD": "img/BFAD.jpg", "BFAE": "img/BFAE.jpg",
        "SHPD": "img/SHPD.jpg", "SHPE": "img/SHPE.jpg", "SHAD": "img/SHAD.jpg", "SHAE": "img/SHAE.jpg",
        "SFPD": "img/SFPD.jpg", "SFPE": "img/SFPE.jpg", "SFAD": "img/SFAD.jpg", "SFAE": "img/SFAE.jpg"
    };

    let currentStep = 0;
    let scores = { B:0, S:0, H:0, F:0, P:0, E:0, D:0, A:0 };

    function router(view) {
        document.getElementById('start-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'none';
        document.getElementById(view + '-view').style.display = 'block';
    }

    function startQuiz() {
        currentStep = 0;
        scores = { B:0, S:0, H:0, F:0, P:0, E:0, D:0, A:0 };
        router('quiz');
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentStep];
        document.getElementById('progress-bar').style.width = ((currentStep + 1) / 32 * 100) + '%';
        document.getElementById('q-meta').innerText = `DNA SCANNING: ${currentStep + 1} / 32`;
        document.getElementById('q-text').innerText = q.q;
        const optionsArea = document.getElementById('options-area');
        optionsArea.innerHTML = `
            <div class="btn-opt" onclick="handleAnswer('A')">A. ${q.a}</div>
            <div class="btn-opt" onclick="handleAnswer('B')">B. ${q.b}</div>
            <div class="btn-opt" onclick="handleAnswer('C')">C. ${q.c}</div>
        `;
    }

    function handleAnswer(choice) {
        const q = questions[currentStep];
        const dim = q.d;
        const weight = q.w;
        const nudge = (currentStep % 2 === 0) ? 0.01 : -0.01;
        if (choice === 'A') scores[dim[0]] += weight;
        else if (choice === 'B') scores[dim[1]] += weight;
        else { scores[dim[0]] += (weight / 2 + nudge); scores[dim[1]] += (weight / 2 - nudge); }
        currentStep++;
        if (currentStep < 32) renderQuestion(); else finalizeResult();
    }

    function finalizeResult() {
        const code = (scores.B >= scores.S ? 'B' : 'S') + (scores.H >= scores.F ? 'H' : 'F') +
                     (scores.P >= scores.E ? 'P' : 'E') + (scores.D >= scores.A ? 'D' : 'A');
        const data = personaData[code];
        router('result');
        const imgContainer = document.getElementById('res-image');
        const imgUrl = personaImages[code];
        imgContainer.className = "res-img-container"; 
        if (imgUrl) {
            const tempImg = new Image();
            tempImg.src = imgUrl;
            tempImg.onload = () => { imgContainer.style.backgroundImage = `url(${imgUrl})`; imgContainer.classList.add('loaded'); };
        } else {
            imgContainer.style.background = `linear-gradient(135deg, #1e1e2e, ${code[0] === 'B' ? 'var(--primary)' : '#70a1ff'})`;
            imgContainer.classList.add('loaded');
        }
        document.getElementById('res-code').innerText = `SEQUENCE // ${code}`;
        document.getElementById('res-name').innerText = data.name;
        document.getElementById('res-summary').innerHTML = `<strong>原力特质报告：</strong>${data.summ}`;
        document.getElementById('res-details').innerHTML = `
            <div class="detail-section"><div class="section-tag">STRATEGY / 战术坐标</div><p style="margin:5px 0 0; font-size:0.95rem;">${data.tactics}</p></div>
            <div class="detail-section"><div class="section-tag">RHYTHM / 感官律动</div><p style="margin:5px 0 0; font-size:0.95rem;">${data.rhythm}</p></div>
            <div class="detail-section"><div class="section-tag">PSYCHOLOGY / 心理本能</div><p style="margin:5px 0 0; font-size:0.95rem;">${data.psych}</p></div>
        `;
        window.scrollTo(0, 0);
    }
</script>
</body>
</html>
